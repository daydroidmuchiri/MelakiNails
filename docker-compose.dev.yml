version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: melaki-postgres
    restart: always
    environment:
      POSTGRES_USER: kabata
      POSTGRES_PASSWORD: kabata123
      POSTGRES_DB: melaki_store
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: melaki-mailpit
    restart: always
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP port

  adminer:
    image: adminer
    container_name: melaki-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
